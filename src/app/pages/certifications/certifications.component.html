<app-header></app-header>

<section class="certification-section">
    
    <h2 class="section-title">
        Certifications
    </h2>
    
    <div class="certificate-container">
        
        <!-- Previous Button -->
        <button class="nav-btn" (click)="previousCertificate()">
            < </button>
            
                <!-- Certificate Card -->
                <div class="certificate-card">

                    <a [href]="certificates[currentIndex].pdf" target="_blank">

                        <img [src]="certificates[currentIndex].image" [alt]="certificates[currentIndex].title">

                    </a>

                    <div class="certificate-details">

                        <h6>
                            {{ certificates[currentIndex].title }}
                        </h6>

                        <p>
                            {{ certificates[currentIndex].issuer }}
                        </p>

                        <a [href]="certificates[currentIndex].pdf" target="_blank" class="btn btn-info">

                            View Certificate

                        </a>

                    </div>

                </div>

                <!-- Next Button -->
                <button class="nav-btn" (click)="nextCertificate()">
                    >
                </button>

    </div>

</section>
